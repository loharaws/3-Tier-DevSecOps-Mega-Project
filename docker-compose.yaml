services:

  mysql:
    image: mysql:8.0
    container_name: mysql

    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: crud_app
      MYSQL_USER: admin
      MYSQL_PASSWORD: admin123

    ports:
      - "3306:3306"

    volumes:
      - mysql_data:/var/lib/mysql
      - ./mysql-init:/docker-entrypoint-initdb.d

    networks:
      - app-network

  backend:
    build: ./backend
    container_name: backend

    depends_on:
      - mysql

    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: admin
      DB_PASSWORD: admin123
      DB_NAME: crud_app

    ports:
      - "5000:5000"

    networks:
      - app-network

  frontend:
    build: ./frontend
    container_name: frontend

    depends_on:
      - backend

    ports:
      - "3000:80"

    networks:
      - app-network

networks:
  app-network:

volumes:
  mysql_data:
